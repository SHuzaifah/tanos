version: "3.9"

services:
  node1:
    build: .
    hostname: node1
    container_name: tanos-node1
    environment:
      - RUST_LOG=info
    networks:
      - tanmesh
    ports:
      - "17700:7700/udp"
      - "17701:7701/tcp"

  node2:
